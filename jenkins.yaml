echo "=== Force flush apt key cache ==="
      sudo apt-get clean
      sudo rm -rf /var/lib/apt/lists/*
      sudo apt-get update -y

trigger:
  - none

pool:
  vmImage: ubuntu-latest

steps:
  - bash: |
      set -e

      echo "=== Update & Install dependencies ==="
      sudo apt-get update -y
      sudo apt-get install -y curl gnupg2 fontconfig openjdk-17-jdk

      echo "=== Java version ==="
      java -version

      echo "=== Remove ALL old Jenkins entries ==="
      sudo rm -f /etc/apt/sources.list.d/jenkins.list
      sudo rm -f /usr/share/keyrings/jenkins-keyring.asc
      sudo rm -f /usr/share/keyrings/jenkins-keyring.gpg

      echo "=== Import correct Jenkins key directly ==="
      curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io.key \
        | sudo tee /usr/share/keyrings/jenkins-keyring.asc > /dev/null

      echo "=== Verify key fingerprint ==="
      gpg --no-default-keyring \
        --keyring /usr/share/keyrings/jenkins-keyring.asc \
        --fingerprint || true

      echo "=== Add Jenkins repo ==="
      echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] \
        https://pkg.jenkins.io/debian-stable binary/" | \
        sudo tee /etc/apt/sources.list.d/jenkins.list > /dev/null

      echo "=== apt update ==="
      sudo apt-get update -y

      echo "=== Install Jenkins ==="
      sudo apt-get install -y jenkins

      echo "=== Start Jenkins ==="
      sudo systemctl enable jenkins
      sudo systemctl start jenkins
      sleep 15

      echo "=== Status ==="
      sudo systemctl status jenkins --no-pager

      echo "=== Admin Password ==="
      sudo cat /var/lib/jenkins/secrets/initialAdminPassword

    displayName: "Install Jenkins"
