trigger: none

pool:
  name: ubuntu 24.04

stages:
- stage: InstallJenkins
  displayName: Install Jenkins

  jobs:
  - deployment: InstallJenkins
    displayName: Install Jenkins on Ubuntu 24.04
    environment: "DevOps Environment"

    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - bash: |
              set -euxo pipefail

              echo "===== OS ====="
              cat /etc/os-release

              echo "===== Update ====="
              sudo apt update

              echo "===== Install Prerequisites ====="
              sudo apt install -y openjdk-21-jdk curl gnupg

              echo "===== Add Jenkins GPG Key ====="
              curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key | \
                sudo gpg --dearmor -o /usr/share/keyrings/jenkins-keyring.gpg

              echo "===== Add Jenkins Repository ====="
              echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/" | \
                sudo tee /etc/apt/sources.list.d/jenkins.list

              echo "===== Refresh Package Index ====="
              sudo apt update

              echo "===== Verify Repository ====="
              apt-cache policy jenkins

              echo "===== Install Jenkins ====="
              sudo apt install -y jenkins

              echo "===== Enable Jenkins ====="
              sudo systemctl daemon-reload
              sudo systemctl enable jenkins
              sudo systemctl start jenkins

              echo "===== Jenkins Status ====="
              sudo systemctl status jenkins --no-pager

              echo "===== Initial Admin Password ====="
              sudo cat /var/lib/jenkins/secrets/initialAdminPassword

            displayName: "Install Jenkins"

             
            displayName: "Install Jenkins"
