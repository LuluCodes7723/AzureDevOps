trigger:
  - none                        # or 'main' / your branch name

pool:
  vmImage: Linux (ubuntu 24.04)      # or your self-hosted agent pool name

steps:
  - bash: |
      set -e

      echo "Updating packages..."
      sudo apt-get update -y

      echo "Installing Java..."
      sudo apt-get install -y fontconfig openjdk-17-jdk

      echo "Removing old Jenkins keys/repos..."
      sudo rm -f /etc/apt/sources.list.d/jenkins.list
      sudo rm -f /usr/share/keyrings/jenkins-keyring.gpg

      echo "Downloading Jenkins GPG key..."
      curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key \
        -o /tmp/jenkins.key

      echo "Installing GPG key..."
      sudo gpg --batch --yes \
        --dearmor -o /usr/share/keyrings/jenkins-keyring.gpg \
        /tmp/jenkins.key
      sudo rm -f /tmp/jenkins.key

      echo "Adding Jenkins repo..."
      echo "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] \
        https://pkg.jenkins.io/debian-stable binary/" \
        | sudo tee /etc/apt/sources.list.d/jenkins.list > /dev/null

      echo "Installing Jenkins..."
      sudo apt-get update -y
      sudo apt-get install -y jenkins

      echo "Starting Jenkins..."
      sudo systemctl enable jenkins
      sudo systemctl start jenkins
      sudo systemctl status jenkins --no-pager

      echo "Admin Password:"
      sudo cat /var/lib/jenkins/secrets/initialAdminPassword

    displayName: "Install Jenkins"
